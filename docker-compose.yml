x-recallstack-api: &recallstack-api
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: recallstack-api:latest
  env_file:
    - ./backend/.env

services:
  postgres:
    image: postgres:16-alpine
    container_name: recallstack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recallstack
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - recallstack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recallstack -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  api:
    <<: *recallstack-api
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: ["docker/api-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/live', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  celery-worker:
    <<: *recallstack-api
    restart: unless-stopped
    command: ["docker/celery-entrypoint.sh"]
    depends_on:
      api:
        condition: service_healthy

  migrate:
    <<: *recallstack-api
    profiles: ["init"]
    command: ["docker/migrate-entrypoint.sh"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy

volumes:
  recallstack-postgres-data:
    name: recallstack-postgres-data
